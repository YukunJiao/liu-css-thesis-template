title: Liu-css-thesis
author: Yukun Jiao
version: 1.0.0
quarto-required: ">=1.7.0"
contributes:
  formats:
    pdf:
      documentclass: liuthesis
      pdf-engine: xelatex
      mathspec: true
      csl: asa.csl
      reference-section-title: References
      top-level-division: chapter
      format-resources:
      - liuthesis.cls
      - hyperpdfx.sty
      - abstract.tex
      - acknowledgments.tex
      - ai_statement.tex
      - ethics_statement.tex
      - figures
      - asa.csl
      include-in-header:
      - include-settings.tex
      filters:
      - write-settings.lua
